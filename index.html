<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>イラストお題箱</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      padding: 24px;
      max-width: 720px;
      margin: auto;
    }
    h1 { font-size: 1.5rem; }
    textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      font-size: 1rem;
      box-sizing: border-box;
      margin-top:6px;
    }
    button {
      margin-top: 12px;
      margin-right:6px;
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
    }
    .result {
      margin-top: 24px;
      padding: 16px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      font-size: 1.2rem;
      text-align: center;
    }
    .theme {
      font-size:0.95rem;
      margin-top:8px;
      color:#555;
    }
    .small { font-size: 0.9rem; color: #555; }
  </style>
</head>
<body>
  <h1>📅 1日1枚お題箱</h1>
  <p id="today"></p>

  <p>イラスト練習向け：<strong>単語をたくさん入れて、ランダムで5つ組み合わせます</strong></p>

  <label>① 単語リスト（ / 区切り）</label>
  <textarea id="words" placeholder="例：
猫耳の少年/夜のカフェ/待ち合わせ/魔法使い/雨の街/走っている"></textarea>

  <label style="margin-top:16px; display:block;">② イラストテーマ（任意）</label>
  <textarea id="theme" placeholder="例：
人が見て癒される
クスッと笑える
楽しい発見"></textarea>

  <label style="display:block; margin-top:10px;">
    <input type="checkbox" id="autoTheme"> テーマ自動生成
  </label>

  <p class="small">※ 入力内容はURLとローカルに保存されます</p>

  <button onclick="pickWords()">🎲 今日のお題を作る</button>
  <button onclick="pickWords(true)">🔄 手動で引き直す</button>
  <button onclick="copyURL()">📋 URLをコピー</button>

  <div id="result" class="result" style="display:none;"></div>

  <div id="timer" class="result" style="display:none; font-size:1rem;"></div>
  <button onclick="startTimer(30)">⏱ 30分</button>
  <button onclick="startTimer(60)">⏱ 60分</button>

  <label style="display:block; margin-top:16px;">
    <input type="checkbox" id="doneCheck" onchange="toggleDone()" /> 今日描いた
  </label>

  <div id="calendar" class="result"></div>

<script>

/* ===== 自動テーマ ===== */
const autoThemes = [
"癒される瞬間",
"小さな発見",
"クスッと笑える",
"静かな幸せ",
"やさしい世界",
"日常の冒険",
"ほっとする時間",
"少し不思議",
"励まされる瞬間",
"懐かしい気持ち"
];

/* ===== 単語保存 ===== */
function saveWords() {
  const words = document.getElementById('words').value.trim();
  const theme = document.getElementById('theme').value.trim();

  const url = new URL(window.location);
  url.searchParams.set('words', words);
  history.replaceState(null, '', url);

  localStorage.setItem('odai_words', words);
  localStorage.setItem('odai_theme', theme);
}

function loadWords() {
  const params = new URLSearchParams(window.location.search);
  const fromURL = params.get('words');

  if (fromURL) {
    document.getElementById('words').value = fromURL;
  } else {
    const local = localStorage.getItem('odai_words');
    if (local) document.getElementById('words').value = local;
  }

  const theme = localStorage.getItem('odai_theme');
  if (theme) document.getElementById('theme').value = theme;
}

/* ===== URLコピー ===== */
function copyURL() {
  saveWords();
  const url = window.location.href;

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(url)
      .then(()=>alert('URLをコピーしました'))
      .catch(()=>manualCopy(url));
  } else {
    manualCopy(url);
  }
}

function manualCopy(text){
  prompt('このURLをコピーしてください', text);
}

/* ===== お題生成 ===== */
function pickWords(forceRandom = false) {
  saveWords();

  const words = document.getElementById('words').value
    .split('/')
    .map(w => w.trim())
    .filter(w => w.length > 0);

  if (words.length < 5) {
    alert('単語を5つ以上入力してください');
    return;
  }

  const today = new Date().toISOString().slice(0,10);

  if (!forceRandom) {
    const saved = localStorage.getItem('odai_today_' + today);
    if (saved) {
      showResult(saved);
      return;
    }
  }

  let seed = Number(today.replace(/-/g,''));

  const seededRandom = () => {
    seed = (seed * 9301 + 49297) % 233280;
    return seed / 233280;
  };

  const shuffled = [...words].sort(
    () => (forceRandom ? Math.random() : seededRandom()) - 0.5
  );

  const selected = shuffled.slice(0,5);

  const text = `${selected[0]} × ${selected[1]} × ${selected[2]} × ${selected[3]} × ${selected[4]}`;

  if (!forceRandom) {
    localStorage.setItem('odai_today_' + today, text);
  }

  showResult(text);
}

function showResult(text){

  const result = document.getElementById('result');
  const auto = document.getElementById('autoTheme').checked;

  let themeText = document.getElementById('theme').value.trim();

  if(auto){
    const rand = autoThemes[Math.floor(Math.random()*autoThemes.length)];
    themeText = rand;
  }

  result.style.display='block';

  if(themeText){

    result.innerHTML = `
      <div>${text}</div>
      <div class="theme">テーマ：${themeText}</div>
    `;

  }else{

    result.textContent=text;

  }

}

/* ===== タイマー ===== */
let timerInterval;
function startTimer(min){
  clearInterval(timerInterval);

  let seconds = min*60;
  const timer = document.getElementById('timer');
  timer.style.display='block';

  timerInterval=setInterval(()=>{

    const m=Math.floor(seconds/60);
    const s=seconds%60;

    timer.textContent=`残り時間：${m}:${s.toString().padStart(2,'0')}`;

    if(seconds--<=0) clearInterval(timerInterval);

  },1000);
}

/* ===== 描いた記録 ===== */
const todayKey = new Date().toISOString().slice(0,10);

function toggleDone(){
  localStorage.setItem(todayKey, document.getElementById('doneCheck').checked);
  renderCalendar();
}

function renderCalendar(){

  const cal=document.getElementById('calendar');

  cal.innerHTML='<strong>今月の記録</strong><br>';

  const now=new Date();

  const days=new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();

  for(let d=1; d<=days; d++){

    const key=new Date(now.getFullYear(), now.getMonth(), d).toISOString().slice(0,10);

    const done=localStorage.getItem(key)==='true';

    cal.innerHTML += done ? `✅${d} ` : `▫️${d} `;

  }
}

/* ===== 初期化 ===== */
const today = new Date();

document.getElementById('today').textContent=
`今日（${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}）のお題`;

window.onload=()=>{

  loadWords();

  document.getElementById('doneCheck').checked = localStorage.getItem(todayKey)==='true';

  pickWords();

  renderCalendar();

};

/* 自動保存 */

document.addEventListener('input', (e)=>{

  if(e.target.id==='words' || e.target.id==='theme') saveWords();

});

</script>
</body>
</html>
