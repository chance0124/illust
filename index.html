<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>イラストお題ジェネレーター</title>

<style>

body{
font-family:sans-serif;
padding:20px;
max-width:700px;
margin:auto;
}

textarea{
width:100%;
height:80px;
margin-bottom:15px;
}

button{
padding:10px 18px;
margin-right:10px;
font-size:16px;
}

.result{
margin-top:25px;
font-size:26px;
font-weight:bold;
line-height:1.6;
}

</style>
</head>

<body>

<h1>イラストお題ジェネレーター</h1>

<p>単語は <b>/</b> で区切って入力してください</p>

<h3>単語</h3>
<textarea id="words"></textarea>

<h3>テーマ</h3>
<textarea id="theme"></textarea>

<button onclick="generate()">お題生成</button>
<button onclick="saveURL()">URL保存</button>
<button onclick="copyURL()">URLコピー</button>

<div class="result" id="result"></div>

<script>

function randomPick(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function shuffle(array){
return array.sort(()=>0.5-Math.random())
}

function generate(){

const words = document.getElementById("words").value
.split("/")
.map(v=>v.trim())
.filter(v=>v!="")

if(words.length < 3){
alert("単語を3つ以上入力してください")
return
}

const themes = document.getElementById("theme").value
.split("/")
.map(v=>v.trim())
.filter(v=>v!="")

const selected = shuffle(words).slice(0,3)

let themeText = ""

if(themes.length>0){
themeText = "<br><br>テーマ： " + randomPick(themes)
}

document.getElementById("result").innerHTML =
selected.join(" / ") + themeText

}

function saveURL(){

const words = encodeURIComponent(document.getElementById("words").value)
const theme = encodeURIComponent(document.getElementById("theme").value)

const url =
location.origin +
location.pathname +
"?w=" + words +
"&t=" + theme

history.replaceState(null,null,url)

alert("URLに保存しました")

}

function copyURL(){

const url = window.location.href

if(navigator.clipboard){

navigator.clipboard.writeText(url)
.then(()=>alert("URLをコピーしました"))
.catch(()=>manualCopy(url))

}else{

manualCopy(url)

}

}

function manualCopy(text){

prompt("このURLをコピーしてください",text)

}

function loadFromURL(){

const params = new URLSearchParams(location.search)

const words = params.get("w")
const theme = params.get("t")

if(words){
document.getElementById("words").value = decodeURIComponent(words)
}

if(theme){
document.getElementById("theme").value = decodeURIComponent(theme)
}

}

loadFromURL()

</script>

</body>
</html>
