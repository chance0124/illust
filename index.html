<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>お題ジェネレーター</title>
<style>
body{
font-family:sans-serif;
padding:20px;
}

textarea{
width:100%;
height:80px;
margin-bottom:10px;
}

button{
padding:10px 20px;
font-size:16px;
}

.result{
margin-top:20px;
font-size:24px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>イラストお題ジェネレーター</h1>

<p>単語は / で区切って入力</p>

<h3>単語</h3>
<textarea id="words"></textarea>

<h3>テーマ</h3>
<textarea id="theme"></textarea>

<button onclick="generate()">ランダム生成</button>

<div class="result" id="result"></div>

<script>

function randomPick(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function generate(){

const words = document.getElementById("words").value.split("/").filter(v=>v.trim()!="")
const themes = document.getElementById("theme").value.split("/").filter(v=>v.trim()!="")

if(words.length < 3){
alert("単語を3つ以上入力してください")
return
}

const shuffled = words.sort(()=>0.5-Math.random())
const selected = shuffled.slice(0,3)

let themeText = ""
if(themes.length>0){
themeText = "テーマ："+randomPick(themes)
}

document.getElementById("result").innerHTML =
selected.join(" / ") + "<br><br>" + themeText

}

</script>

</body>
</html>
